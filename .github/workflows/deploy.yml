name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

env:
  DEPLOY_PATH: /home/u407096753/domains/rosybrown-anteater-512968.hostingersite.com/public_html

jobs:
  deploy:
    name: Build and deploy HEROHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, gd, intl, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: |
          cp .env.example .env
          php artisan key:generate --force
          npm ci
          npx vite build

      - name: Install rsync and sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Prepare SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to Hostinger
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage/logs/' \
            --exclude='storage/app/public/' \
            --exclude='storage/framework/cache/data/' \
            --exclude='.phpunit.result.cache' \
            --exclude='_template_cache/' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Run Laravel post-deploy commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan storage:link 2>/dev/null || ln -sfn "$(pwd)/storage/app/public" "$(pwd)/public/storage"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            chmod -R 775 storage bootstrap/cache
